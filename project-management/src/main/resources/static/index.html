<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Controle de Projetos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 30px 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 5px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #ddd;
            flex-wrap: wrap;
        }

        .tab-button {
            padding: 12px 24px;
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .tab-button:hover {
            color: #2c3e50;
        }

        .tab-button.active {
            color: #2c3e50;
            border-bottom-color: #3498db;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .section {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 25px;
        }

        .section h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #2c3e50;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            padding: 10px 20px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3);
        }

        button.delete {
            background-color: #e74c3c;
        }

        button.delete:hover {
            background-color: #c0392b;
        }

        button.secondary {
            background-color: #95a5a6;
        }

        button.secondary:hover {
            background-color: #7f8c8d;
        }

        .list-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border: 1px solid #ecf0f1;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        .card:hover {
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }

        .card h3 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .card p {
            color: #7f8c8d;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .card-actions {
            display: flex;
            gap: 8px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .card-actions button {
            flex: 1;
            padding: 8px 12px;
            font-size: 12px;
        }

        .tag {
            display: inline-block;
            background-color: #ecf0f1;
            color: #2c3e50;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-right: 8px;
            margin-bottom: 8px;
        }

        .employee-tag {
            background-color: #d5f4e6;
            color: #27ae60;
        }

        .project-tag {
            background-color: #fef5e7;
            color: #f39c12;
        }

        .alert {
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.success {
            background-color: #d5f4e6;
            color: #27ae60;
            border: 1px solid #27ae60;
            display: block;
        }

        .alert.error {
            background-color: #fadbd8;
            color: #c0392b;
            border: 1px solid #c0392b;
            display: block;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 30px;
            border-radius: 8px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .modal-content h3 {
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .close-modal {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .close-modal:hover {
            color: #000;
        }

        .two-column {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .two-column {
                grid-template-columns: 1fr;
            }

            .tabs {
                flex-direction: column;
            }

            .list-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Sistema de Controle de Projetos</h1>
            <p>Gerencie projetos, funcionários e setores de forma eficiente</p>
        </header>

        <div id="alertContainer"></div>

        <div class="tabs">
            <button class="tab-button active" onclick="switchTab('setores')">📁 Setores</button>
            <button class="tab-button" onclick="switchTab('funcionarios')">👥 Funcionários</button>
            <button class="tab-button" onclick="switchTab('projetos')">📋 Projetos</button>
        </div>

        <!-- TAB: SETORES -->
        <div id="setores" class="tab-content active">
            <div class="section">
                <h2>Adicionar Novo Setor</h2>
                <form id="setorForm">
                    <div class="form-group">
                        <label for="setorNome">Nome do Setor:</label>
                        <input type="text" id="setorNome" placeholder="Ex: Desenvolvimento" required>
                    </div>
                    <button type="submit">➕ Adicionar Setor</button>
                </form>
            </div>

            <div class="section">
                <h2>Setores Cadastrados</h2>
                <div class="list-container" id="setoresList"></div>
            </div>
        </div>

        <!-- TAB: FUNCIONARIOS -->
        <div id="funcionarios" class="tab-content">
            <div class="section">
                <h2>Adicionar Novo Funcionário</h2>
                <form id="funcionarioForm">
                    <div class="form-group">
                        <label for="funcNome">Nome:</label>
                        <input type="text" id="funcNome" placeholder="Ex: João Silva" required>
                    </div>
                    <div class="form-group">
                        <label for="funcEmail">Email:</label>
                        <input type="email" id="funcEmail" placeholder="Ex: joao@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="funcSetor">Setor:</label>
                        <select id="funcSetor" required>
                            <option value="">Selecione um setor...</option>
                        </select>
                    </div>
                    <button type="submit">➕ Adicionar Funcionário</button>
                </form>
            </div>

            <div class="section">
                <h2>Funcionários Cadastrados</h2>
                <div class="list-container" id="funcionariosList"></div>
            </div>
        </div>

        <!-- TAB: PROJETOS -->
        <div id="projetos" class="tab-content">
            <div class="section">
                <h2>Adicionar Novo Projeto</h2>
                <form id="projetoForm">
                    <div class="form-group">
                        <label for="projNome">Nome do Projeto:</label>
                        <input type="text" id="projNome" placeholder="Ex: App Mobile" required>
                    </div>
                    <div class="form-group">
                        <label for="projDesc">Descrição:</label>
                        <textarea id="projDesc" placeholder="Ex: Desenvolvimento de aplicativo mobile..." required></textarea>
                    </div>
                    <div class="two-column">
                        <div class="form-group">
                            <label for="projDataInicio">Data de Início:</label>
                            <input type="date" id="projDataInicio" required>
                        </div>
                        <div class="form-group">
                            <label for="projDataFim">Data de Fim:</label>
                            <input type="date" id="projDataFim" required>
                        </div>
                    </div>
                    <button type="submit">➕ Adicionar Projeto</button>
                </form>
            </div>

            <div class="section">
                <h2>Projetos Cadastrados</h2>
                <div class="list-container" id="projetosList"></div>
            </div>
        </div>
    </div>

    <!-- Modal para vincular funcionários -->
    <div id="vinculoModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeVinculoModal()">&times;</span>
            <h3>Vincular Funcionários ao Projeto</h3>
            <div id="vinculoFuncionariosList"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8082/api';
        let currentProjetoId = null;

        // ==================== FUNCTIONS GERAIS ====================
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
            
            // Recarregar dados da aba
            if (tabName === 'setores') loadSetores();
            if (tabName === 'funcionarios') { loadFuncionarios(); loadSetoresSelect(); }
            if (tabName === 'projetos') loadProjetos();
        }

        function showAlert(message, type = 'success') {
            const alertContainer = document.getElementById('alertContainer');
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert ${type}`;
            alertDiv.textContent = message;
            alertContainer.innerHTML = '';
            alertContainer.appendChild(alertDiv);
            setTimeout(() => alertDiv.style.display = 'none', 5000);
        }

        // ==================== SETORES ====================
        async function loadSetores() {
            try {
                const response = await fetch(`${API_BASE}/setores/with-funcionarios`);
                const setores = await response.json();
                const setoresList = document.getElementById('setoresList');
                setoresList.innerHTML = '';

                if (setores.length === 0) {
                    setoresList.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #7f8c8d;">Nenhum setor cadastrado</p>';
                    return;
                }

                setores.forEach(setor => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <h3>📁 ${setor.nome}</h3>
                        <p><strong>Funcionários:</strong> ${setor.funcionarios.length}</p>
                        ${setor.funcionarios.length > 0 ? `
                            <div>
                                ${setor.funcionarios.map(f => `<span class="tag employee-tag">${f.nome}</span>`).join('')}
                            </div>
                        ` : '<p style="color: #95a5a6; font-size: 12px;">Sem funcionários</p>'}
                        <div class="card-actions">
                            <button class="delete" onclick="deleteSetor(${setor.id})">🗑️ Deletar</button>
                        </div>
                    `;
                    setoresList.appendChild(card);
                });
            } catch (error) {
                showAlert('Erro ao carregar setores: ' + error.message, 'error');
            }
        }

        document.getElementById('setorForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nome = document.getElementById('setorNome').value;
            try {
                const response = await fetch(`${API_BASE}/setores`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome })
                });
                if (response.ok) {
                    showAlert('✅ Setor adicionado com sucesso!', 'success');
                    document.getElementById('setorForm').reset();
                    loadSetores();
                } else {
                    const error = await response.text();
                    showAlert('❌ Erro: ' + error, 'error');
                }
            } catch (error) {
                showAlert('❌ Erro ao adicionar setor: ' + error.message, 'error');
            }
        });

        async function deleteSetor(id) {
            if (!confirm('Tem certeza que deseja deletar este setor?')) return;
            try {
                const response = await fetch(`${API_BASE}/setores/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    showAlert('✅ Setor deletado com sucesso!', 'success');
                    loadSetores();
                }
            } catch (error) {
                showAlert('❌ Erro ao deletar setor', 'error');
            }
        }

        // ==================== FUNCIONARIOS ====================
        async function loadSetoresSelect() {
            try {
                const response = await fetch(`${API_BASE}/setores`);
                const setores = await response.json();
                const select = document.getElementById('funcSetor');
                select.innerHTML = '<option value="">Selecione um setor...</option>';
                setores.forEach(setor => {
                    const option = document.createElement('option');
                    option.value = setor.id;
                    option.textContent = setor.nome;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Erro ao carregar setores:', error);
            }
        }

        async function loadFuncionarios() {
            try {
                const response = await fetch(`${API_BASE}/funcionarios`);
                const funcionarios = await response.json();
                const funcionariosList = document.getElementById('funcionariosList');
                funcionariosList.innerHTML = '';

                if (funcionarios.length === 0) {
                    funcionariosList.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #7f8c8d;">Nenhum funcionário cadastrado</p>';
                    return;
                }

                funcionarios.forEach(func => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <h3>👤 ${func.nome}</h3>
                        <p><strong>Email:</strong> ${func.email}</p>
                        <p><strong>Setor:</strong> ${func.setor ? func.setor.nome : 'N/A'}</p>
                        <p><strong>Projetos:</strong> ${func.projetos ? func.projetos.length : 0}</p>
                        <div class="card-actions">
                            <button class="delete" onclick="deleteFuncionario(${func.id})">🗑️ Deletar</button>
                        </div>
                    `;
                    funcionariosList.appendChild(card);
                });
            } catch (error) {
                showAlert('Erro ao carregar funcionários: ' + error.message, 'error');
            }
        }

        document.getElementById('funcionarioForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nome = document.getElementById('funcNome').value;
            const email = document.getElementById('funcEmail').value;
            const setorId = document.getElementById('funcSetor').value;

            try {
                const response = await fetch(`${API_BASE}/funcionarios`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        nome,
                        email,
                        setor: setorId ? { id: setorId } : null
                    })
                });
                if (response.ok) {
                    showAlert('✅ Funcionário adicionado com sucesso!', 'success');
                    document.getElementById('funcionarioForm').reset();
                    loadFuncionarios();
                } else {
                    const error = await response.text();
                    showAlert('❌ Erro: ' + error, 'error');
                }
            } catch (error) {
                showAlert('❌ Erro ao adicionar funcionário: ' + error.message, 'error');
            }
        });

        async function deleteFuncionario(id) {
            if (!confirm('Tem certeza que deseja deletar este funcionário?')) return;
            try {
                const response = await fetch(`${API_BASE}/funcionarios/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    showAlert('✅ Funcionário deletado com sucesso!', 'success');
                    loadFuncionarios();
                }
            } catch (error) {
                showAlert('❌ Erro ao deletar funcionário', 'error');
            }
        }

        // ==================== PROJETOS ====================
        async function loadProjetos() {
            try {
                const response = await fetch(`${API_BASE}/projetos`);
                const projetos = await response.json();
                const projetosList = document.getElementById('projetosList');
                projetosList.innerHTML = '';

                if (projetos.length === 0) {
                    projetosList.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #7f8c8d;">Nenhum projeto cadastrado</p>';
                    return;
                }

                projetos.forEach(proj => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    const dataInicio = new Date(proj.dataInicio).toLocaleDateString('pt-BR');
                    const dataFim = new Date(proj.dataFim).toLocaleDateString('pt-BR');
                    card.innerHTML = `
                        <h3>📋 ${proj.nome}</h3>
                        <p>${proj.descricao}</p>
                        <p><strong>Período:</strong> ${dataInicio} até ${dataFim}</p>
                        <p><strong>Funcionários:</strong> ${proj.funcionarios.length}</p>
                        ${proj.funcionarios.length > 0 ? `
                            <div>
                                ${proj.funcionarios.map(f => `<span class="tag project-tag">${f.nome}</span>`).join('')}
                            </div>
                        ` : '<p style="color: #95a5a6; font-size: 12px;">Sem funcionários</p>'}
                        <div class="card-actions">
                            <button class="secondary" onclick="openVinculoModal(${proj.id})">👥 Vincular</button>
                            <button class="delete" onclick="deleteProjeto(${proj.id})">🗑️ Deletar</button>
                        </div>
                    `;
                    projetosList.appendChild(card);
                });
            } catch (error) {
                showAlert('Erro ao carregar projetos: ' + error.message, 'error');
            }
        }

        document.getElementById('projetoForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nome = document.getElementById('projNome').value;
            const descricao = document.getElementById('projDesc').value;
            const dataInicio = document.getElementById('projDataInicio').value;
            const dataFim = document.getElementById('projDataFim').value;

            try {
                const response = await fetch(`${API_BASE}/projetos`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, descricao, dataInicio, dataFim, funcionarios: [] })
                });
                if (response.ok) {
                    showAlert('✅ Projeto adicionado com sucesso!', 'success');
                    document.getElementById('projetoForm').reset();
                    loadProjetos();
                } else {
                    const error = await response.text();
                    showAlert('❌ Erro: ' + error, 'error');
                }
            } catch (error) {
                showAlert('❌ Erro ao adicionar projeto: ' + error.message, 'error');
            }
        });

        async function deleteProjeto(id) {
            if (!confirm('Tem certeza que deseja deletar este projeto?')) return;
            try {
                const response = await fetch(`${API_BASE}/projetos/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    showAlert('✅ Projeto deletado com sucesso!', 'success');
                    loadProjetos();
                }
            } catch (error) {
                showAlert('❌ Erro ao deletar projeto', 'error');
            }
        }

        // ==================== VINCULAR FUNCIONÁRIOS ====================
        async function openVinculoModal(projetoId) {
            currentProjetoId = projetoId;
            try {
                const response = await fetch(`${API_BASE}/funcionarios`);
                const funcionarios = await response.json();
                const vinculoList = document.getElementById('vinculoFuncionariosList');
                vinculoList.innerHTML = '';

                funcionarios.forEach(func => {
                    const div = document.createElement('div');
                    div.style.marginBottom = '10px';
                    div.innerHTML = `
                        <label style="display: flex; align-items: center; cursor: pointer;">
                            <input type="checkbox" value="${func.id}" onchange="handleVincularFuncionario(this)">
                            <span style="margin-left: 10px;">${func.nome} (${func.email})</span>
                        </label>
                    `;
                    vinculoList.appendChild(div);
                });

                document.getElementById('vinculoModal').style.display = 'block';
            } catch (error) {
                showAlert('Erro ao carregar funcionários: ' + error.message, 'error');
            }
        }

        function closeVinculoModal() {
            document.getElementById('vinculoModal').style.display = 'none';
            currentProjetoId = null;
        }

        async function handleVincularFuncionario(checkbox) {
            if (!currentProjetoId) return;

            try {
                const funcionarioId = checkbox.value;
                const method = checkbox.checked ? 'POST' : 'DELETE';
                const response = await fetch(`${API_BASE}/projetos/${currentProjetoId}/funcionarios/${funcionarioId}`, {
                    method: method
                });

                if (response.ok) {
                    showAlert(checkbox.checked ? '✅ Funcionário vinculado!' : '✅ Funcionário desvinculado!', 'success');
                    loadProjetos();
                } else {
                    showAlert('❌ Erro ao vincular/desvincular funcionário', 'error');
                    checkbox.checked = !checkbox.checked;
                }
            } catch (error) {
                showAlert('❌ Erro: ' + error.message, 'error');
                checkbox.checked = !checkbox.checked;
            }
        }

        // Carregar dados ao iniciar
        window.addEventListener('load', () => {
            loadSetores();
            loadSetoresSelect();
        });

        // Fechar modal ao clicar fora
        window.onclick = (event) => {
            const modal = document.getElementById('vinculoModal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        };
    </script>
</body>
</html>
